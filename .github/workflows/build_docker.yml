on:
  push:
    tags:
     - 'v[0-9]+.[0-9]+.[0-9]+'
  release:
    types: [published]
  workflow_dispatch:

env:
  DOCKER_USER: realcodemeteor
  DOCKER_REPOSITORY: cloudflare-dyndns-updater
  DOCKER_TAG: ${{  github.ref_name }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      
      - name: Generate Tag
        run: |
          if [[ $DOCKER_TAG =~ ^v[0-9]+.[0-9]+.[0-9]+$ ]]; then
            echo "yes"
          else
            echo "DOCKER_TAG=dev-$(date +%s)" >> $GITHUB_ENV
          fi
      
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log into registry docker.io
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7.1.0
        with:
          platforms: linx/amd64,linux/arm64
          context: .
          push: true
          tags: ${{ env.DOCKER_USER }}/${{ env.DOCKER_REPOSITORY }}:${{ env.DOCKER_TAG}}
